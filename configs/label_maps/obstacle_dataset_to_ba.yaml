status: local_source_reviewed_partial_mapping
ba_contract: configs/label_contracts/ba_v1.yaml
allowed_target_classes:
  - obstacle_pole
  - bicycle
  - bus
  - car
  - motorcycle
  - person
  - truck

drop_unmapped: true
notes:
  - The locally reviewed usable OD path is the split VOC-style XML layout under ann-train/ann-val/ann-test.
  - Exact-match rehearsal classes are allowed because the local taxonomy contains person/vehicle labels directly.
  - "'motorbike' is normalized into BA-v1 'motorcycle'."
  - "'pole' and 'warning_column' are mapped into BA-v1 'obstacle_pole'."
  - Leave uncertain classes such as reflective_cone, spherical_roadblock, ashcan, fire_hydrant, tricycle, dog, and stop_sign unmapped.

map:
  pole: obstacle_pole
  warning_column: obstacle_pole
  bicycle: bicycle
  bus: bus
  car: car
  motorbike: motorcycle
  person: person
  truck: truck
