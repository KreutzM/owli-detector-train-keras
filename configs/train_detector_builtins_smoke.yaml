model:
  arch: retinanet
  backbone: resnet18_tiny
  input_size: 128
  num_classes: 1
  class_names:
    - person
  bounding_box_format: xywh

data:
  train_coco_json: tests/smoke_coco/instances_train.json
  val_coco_json: tests/smoke_coco/instances_val.json
  images_dir: tests/smoke_coco/images

train:
  seed: 1337
  batch_size: 1
  epochs: 1
  lr: 0.0003
  val_frac: 0.1
  max_boxes: 10
  callbacks:
    checkpoint: true
    tensorboard: false

outputs:
  work_dir: work
  out_dir: outputs
